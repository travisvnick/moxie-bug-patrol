<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Shadow (tiny!) -->
  <ellipse cx="64" cy="122" rx="18" ry="5" fill="rgba(18,50,80,0.15)"/>

  <!-- GIANT CRUMB (comically oversized — bigger than the ant's whole body) -->
  <path d="M36,12 Q22,6 20,20 Q16,36 26,46 Q34,54 50,52 Q66,56 78,50 Q92,46 92,32 Q92,18 78,12 Q66,6 52,10 Q44,8 36,12Z"
        fill="#D4A853" stroke="#8B6520" stroke-width="2.5"/>
  <!-- Crumb internal texture lines -->
  <path d="M32,28 Q44,24 54,30" stroke="#B8892A" stroke-width="1.5" fill="none" opacity="0.55"/>
  <path d="M56,18 Q68,22 72,36" stroke="#B8892A" stroke-width="1.5" fill="none" opacity="0.55"/>
  <path d="M38,40 Q52,44 66,40" stroke="#B8892A" stroke-width="1.5" fill="none" opacity="0.45"/>
  <!-- Crumb highlight (shiny bread crust) -->
  <ellipse cx="44" cy="20" rx="14" ry="7" fill="#E8C070" opacity="0.40"/>
  <!-- Crumb texture bubbles -->
  <circle cx="42" cy="38" r="4" fill="#C8922A" opacity="0.35"/>
  <circle cx="62" cy="30" r="3" fill="#C8922A" opacity="0.35"/>
  <circle cx="76" cy="42" r="3.5" fill="#C8922A" opacity="0.35"/>
  <circle cx="30" cy="32" r="2.5" fill="#C8922A" opacity="0.30"/>

  <!-- ANT FRONT ARMS reaching up to grip the crumb -->
  <path d="M54,54 Q52,64 56,74" stroke="#8B2200" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M74,54 Q76,64 72,74" stroke="#8B2200" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Walking legs — left side -->
  <path d="M54,86 Q42,82 36,88" stroke="#8B2200" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="35" cy="89" r="2.5" fill="#6A1A00"/>
  <path d="M52,94 Q38,96 34,106" stroke="#8B2200" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="33" cy="107" r="2.5" fill="#6A1A00"/>
  <path d="M54,100 Q42,108 40,118" stroke="#8B2200" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="39" cy="119" r="2.5" fill="#6A1A00"/>

  <!-- Walking legs — right side -->
  <path d="M74,86 Q86,82 92,88" stroke="#8B2200" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="93" cy="89" r="2.5" fill="#6A1A00"/>
  <path d="M76,94 Q90,96 94,106" stroke="#8B2200" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="95" cy="107" r="2.5" fill="#6A1A00"/>
  <path d="M74,100 Q86,108 88,118" stroke="#8B2200" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="89" cy="119" r="2.5" fill="#6A1A00"/>

  <!-- Ant ABDOMEN (gaster) — largest segment, red-brown -->
  <ellipse cx="64" cy="100" rx="14" ry="17" fill="#CC3300" stroke="#6A1A00" stroke-width="2.5"/>
  <ellipse cx="59" cy="92" rx="5" ry="4" fill="#EE5522" opacity="0.4"/>

  <!-- Ant PETIOLE (narrow waist — classic ant shape) -->
  <ellipse cx="64" cy="82" rx="5" ry="4" fill="#AA2200" stroke="#6A1A00" stroke-width="2"/>

  <!-- Ant THORAX -->
  <ellipse cx="64" cy="76" rx="9" ry="6" fill="#BB2200" stroke="#6A1A00" stroke-width="2"/>
  <!-- White dot on thorax (signature feature) -->
  <circle cx="64" cy="75" r="3.5" fill="white" opacity="0.75"/>

  <!-- Ant HEAD -->
  <ellipse cx="64" cy="68" rx="10" ry="8" fill="#CC3300" stroke="#6A1A00" stroke-width="2.5"/>

  <!-- Eyes (determined, straining) -->
  <circle cx="57" cy="66" r="3.5" fill="#1A1A1A" stroke="white" stroke-width="1.5"/>
  <circle cx="58" cy="65" r="1.3" fill="white"/>
  <circle cx="71" cy="66" r="3.5" fill="#1A1A1A" stroke="white" stroke-width="1.5"/>
  <circle cx="72" cy="65" r="1.3" fill="white"/>

  <!-- Antennae (small) -->
  <path d="M58,62 Q50,56 44,50" stroke="#6A1A00" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="43" cy="49" r="3" fill="#AA2200"/>
  <path d="M70,62 Q78,56 84,50" stroke="#6A1A00" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="85" cy="49" r="3" fill="#AA2200"/>

  <!-- Effort / strain marks (it's working HARD) -->
  <line x1="36" y1="70" x2="28" y2="66" stroke="#CC3300" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="34" y1="78" x2="24" y2="78" stroke="#CC3300" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="92" y1="70" x2="100" y2="66" stroke="#CC3300" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="94" y1="78" x2="104" y2="78" stroke="#CC3300" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
</svg>
