<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="wing-pink" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FF69B4"/>
      <stop offset="55%" stop-color="#FF1493"/>
      <stop offset="100%" stop-color="#880044"/>
    </radialGradient>
    <radialGradient id="wing-green" cx="65%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#7FFF44"/>
      <stop offset="55%" stop-color="#39FF14"/>
      <stop offset="100%" stop-color="#006622"/>
    </radialGradient>
  </defs>

  <!-- Outer glow aura (glowing wings feel) -->
  <ellipse cx="30" cy="56" rx="26" ry="32" fill="#FF1493" opacity="0.18"/>
  <ellipse cx="98" cy="56" rx="26" ry="32" fill="#39FF14" opacity="0.18"/>

  <!-- UPPER LEFT WING (hot pink) -->
  <path d="M62,58 Q50,26 10,14 Q2,40 8,66 Q18,84 54,84 Q64,74 62,58Z"
        fill="url(#wing-pink)" stroke="#CC0066" stroke-width="2.5"/>
  <!-- Upper left eye-spot -->
  <circle cx="30" cy="58" r="15" fill="#FF69B4" opacity="0.65" stroke="#CC0066" stroke-width="1.5"/>
  <circle cx="30" cy="58" r="10" fill="#FF1493" stroke="#AA0044" stroke-width="1.5"/>
  <circle cx="30" cy="58" r="5.5" fill="#220022" stroke="#FF1493" stroke-width="1"/>
  <circle cx="30" cy="58" r="2.5" fill="white" opacity="0.6"/>

  <!-- UPPER RIGHT WING (electric green) -->
  <path d="M66,58 Q78,26 118,14 Q126,40 120,66 Q110,84 74,84 Q64,74 66,58Z"
        fill="url(#wing-green)" stroke="#005500" stroke-width="2.5"/>
  <!-- Upper right eye-spot -->
  <circle cx="98" cy="58" r="15" fill="#7FFF44" opacity="0.65" stroke="#005500" stroke-width="1.5"/>
  <circle cx="98" cy="58" r="10" fill="#39FF14" stroke="#004400" stroke-width="1.5"/>
  <circle cx="98" cy="58" r="5.5" fill="#002200" stroke="#39FF14" stroke-width="1"/>
  <circle cx="98" cy="58" r="2.5" fill="white" opacity="0.6"/>

  <!-- LOWER LEFT WING (hot pink, smaller hindwing) -->
  <path d="M60,82 Q38,96 26,116 Q44,120 60,104 Q66,94 62,82Z"
        fill="#FF1493" stroke="#CC0066" stroke-width="2.5" opacity="0.88"/>

  <!-- LOWER RIGHT WING (electric green, smaller hindwing) -->
  <path d="M68,82 Q90,96 102,116 Q84,120 68,104 Q62,94 66,82Z"
        fill="#39FF14" stroke="#005500" stroke-width="2.5" opacity="0.88"/>

  <!-- BODY (fuzzy, white/cream) -->
  <!-- Abdomen — striped -->
  <ellipse cx="64" cy="96" rx="8" ry="16" fill="#F5F5DC" stroke="#CCCCAA" stroke-width="2.5"/>
  <rect x="57" y="85" width="14" height="4" rx="2" fill="#FFCC00" opacity="0.55"/>
  <rect x="57" y="92" width="14" height="4" rx="2" fill="#FFCC00" opacity="0.45"/>
  <rect x="57" y="99" width="14" height="4" rx="2" fill="#FFCC00" opacity="0.35"/>
  <!-- Thorax -->
  <ellipse cx="64" cy="76" rx="9" ry="8" fill="white" stroke="#BBBBAA" stroke-width="2"/>
  <!-- Head (fluffy) -->
  <ellipse cx="64" cy="62" rx="10" ry="9" fill="white" stroke="#AAAAAA" stroke-width="2.5"/>
  <!-- Fuzzy texture dots -->
  <circle cx="60" cy="66" r="1.2" fill="#DDDDCC"/>
  <circle cx="68" cy="66" r="1.2" fill="#DDDDCC"/>
  <circle cx="64" cy="69" r="1.2" fill="#DDDDCC"/>

  <!-- Eyes -->
  <circle cx="58" cy="60" r="4.5" fill="#0A0A0A" stroke="white" stroke-width="1.5"/>
  <circle cx="59.5" cy="58.5" r="1.8" fill="white"/>
  <circle cx="70" cy="60" r="4.5" fill="#0A0A0A" stroke="white" stroke-width="1.5"/>
  <circle cx="71.5" cy="58.5" r="1.8" fill="white"/>

  <!-- ANTENNAE with ball tips (pink + green, matching wing colors) -->
  <path d="M58,54 Q50,42 40,34" stroke="#CC0066" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="39" cy="33" r="5" fill="#FF1493" stroke="#CC0066" stroke-width="2"/>
  <path d="M70,54 Q78,42 88,34" stroke="#005500" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="89" cy="33" r="5" fill="#39FF14" stroke="#005500" stroke-width="2"/>

  <!-- Neon sparkle dots around wings -->
  <circle cx="8" cy="38" r="2.5" fill="#FF1493" opacity="0.6"/>
  <circle cx="120" cy="38" r="2.5" fill="#39FF14" opacity="0.6"/>
  <circle cx="12" cy="80" r="1.8" fill="#FFD700" opacity="0.55"/>
  <circle cx="116" cy="80" r="1.8" fill="#FFD700" opacity="0.55"/>
</svg>
