<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Upper wings (large, spread wide) -->
  <ellipse cx="12" cy="18" rx="11" ry="8" fill="#FF1E8C" transform="rotate(-20 12 18)"/>
  <ellipse cx="36" cy="18" rx="11" ry="8" fill="#FF1E8C" transform="rotate(20 36 18)"/>
  <!-- Upper wing neon green patches -->
  <ellipse cx="10" cy="16" rx="5" ry="3.5" fill="#39FF14" opacity="0.7" transform="rotate(-20 10 16)"/>
  <ellipse cx="38" cy="16" rx="5" ry="3.5" fill="#39FF14" opacity="0.7" transform="rotate(20 38 16)"/>
  <!-- Upper wing eye spots -->
  <circle cx="13" cy="20" r="3" fill="#FF80D0"/>
  <circle cx="13" cy="20" r="1.5" fill="#FFD700"/>
  <circle cx="35" cy="20" r="3" fill="#FF80D0"/>
  <circle cx="35" cy="20" r="1.5" fill="#FFD700"/>

  <!-- Lower wings (smaller) -->
  <ellipse cx="14" cy="32" rx="9" ry="6" fill="#C800A0" transform="rotate(15 14 32)"/>
  <ellipse cx="34" cy="32" rx="9" ry="6" fill="#C800A0" transform="rotate(-15 34 32)"/>
  <!-- Lower wing neon highlights -->
  <ellipse cx="13" cy="31" rx="4" ry="2.5" fill="#39FF14" opacity="0.6" transform="rotate(15 13 31)"/>
  <ellipse cx="35" cy="31" rx="4" ry="2.5" fill="#39FF14" opacity="0.6" transform="rotate(-15 35 31)"/>

  <!-- Fuzzy body -->
  <ellipse cx="24" cy="30" rx="3.5" ry="6" fill="#7B0060"/>
  <ellipse cx="24" cy="30" rx="2.5" ry="5.5" fill="#AA0088"/>
  <!-- Fuzzy texture dots -->
  <circle cx="23" cy="27" r="1" fill="#CC44AA" opacity="0.6"/>
  <circle cx="25" cy="29" r="1" fill="#CC44AA" opacity="0.6"/>
  <circle cx="23" cy="32" r="1" fill="#CC44AA" opacity="0.6"/>

  <!-- Thorax -->
  <ellipse cx="24" cy="22" rx="3.5" ry="4" fill="#9900AA"/>

  <!-- Head -->
  <ellipse cx="24" cy="16" rx="4" ry="3.5" fill="#BB00CC"/>

  <!-- Big round eyes (glowing) -->
  <circle cx="21" cy="15" r="2.8" fill="#CCFFCC" stroke="#39FF14" stroke-width="0.8"/>
  <circle cx="27" cy="15" r="2.8" fill="#CCFFCC" stroke="#39FF14" stroke-width="0.8"/>
  <circle cx="21.5" cy="15.5" r="1.6" fill="#003300"/>
  <circle cx="27.5" cy="15.5" r="1.6" fill="#003300"/>
  <circle cx="21.8" cy="14.8" r="0.7" fill="white"/>
  <circle cx="27.8" cy="14.8" r="0.7" fill="white"/>

  <!-- Antennae with clubbed tips -->
  <path d="M22 13 Q18 8 15 5" stroke="#FF1E8C" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <path d="M26 13 Q30 8 33 5" stroke="#FF1E8C" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <circle cx="15" cy="5" r="2" fill="#39FF14"/>
  <circle cx="33" cy="5" r="2" fill="#39FF14"/>

  <!-- Neon glow shimmer dots -->
  <circle cx="6"  cy="14" r="1.2" fill="#39FF14" opacity="0.6"/>
  <circle cx="42" cy="14" r="1.2" fill="#FF1E8C" opacity="0.6"/>
  <circle cx="8"  cy="36" r="1.0" fill="#FFD700" opacity="0.5"/>
  <circle cx="40" cy="36" r="1.0" fill="#FFD700" opacity="0.5"/>
</svg>
