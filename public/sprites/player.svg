<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 88" width="48" height="88">
  <!-- Left leg (long and thin) -->
  <rect x="15" y="56" width="8" height="26" rx="4" fill="#123250"/>
  <!-- Right leg (long and thin) -->
  <rect x="25" y="56" width="8" height="26" rx="4" fill="#123250"/>

  <!-- Left shoe -->
  <ellipse cx="19" cy="84" rx="7" ry="4" fill="#1a1a1a"/>
  <!-- Right shoe -->
  <ellipse cx="29" cy="84" rx="7" ry="4" fill="#1a1a1a"/>

  <!-- Left arm (long and thin) -->
  <rect x="5" y="36" width="8" height="24" rx="4" fill="#7BB8E0"/>
  <!-- Right arm (long and thin) -->
  <rect x="35" y="36" width="8" height="24" rx="4" fill="#7BB8E0"/>

  <!-- Body (round, light blue shirt) -->
  <ellipse cx="24" cy="47" rx="14" ry="12" fill="#7BB8E0"/>

  <!-- Neck -->
  <rect x="20" y="31" width="8" height="9" rx="3" fill="#F4C3A0"/>

  <!-- Head (round) -->
  <ellipse cx="24" cy="24" rx="13" ry="13" fill="#F4C3A0"/>

  <!-- Cap crown -->
  <path d="M11,21 Q11,8 24,7 Q37,8 37,21 Z" fill="#111111"/>
  <!-- Cap brim -->
  <rect x="8" y="19" width="32" height="5" rx="2.5" fill="#111111"/>

  <!-- Blue diamond logo on cap -->
  <polygon points="22,12 24,9 26,12 24,15" fill="#0C77D8"/>

  <!-- Eyes (whites) -->
  <ellipse cx="19" cy="23" rx="3" ry="3" fill="white"/>
  <ellipse cx="29" cy="23" rx="3" ry="3" fill="white"/>
  <!-- Pupils -->
  <circle cx="20" cy="23" r="1.8" fill="#222"/>
  <circle cx="30" cy="23" r="1.8" fill="#222"/>

  <!-- Eyebrows -->
  <path d="M16,19 Q19,17 22,19" stroke="#555" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M26,19 Q29,17 32,19" stroke="#555" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M19,29 Q24,33 29,29" stroke="#C87860" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
