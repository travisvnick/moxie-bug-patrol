<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Shadow -->
  <ellipse cx="48" cy="122" rx="26" ry="6" fill="rgba(18,50,80,0.15)"/>

  <!-- TAIL segments (drawn first, curves from right of abdomen up and over) -->
  <ellipse cx="74" cy="86" rx="11" ry="7" fill="#C8AE80" stroke="#7A5A30" stroke-width="2" transform="rotate(20 74 86)"/>
  <ellipse cx="90" cy="76" rx="10" ry="6.5" fill="#C0A478" stroke="#7A5A30" stroke-width="2" transform="rotate(50 90 76)"/>
  <ellipse cx="100" cy="60" rx="9" ry="6" fill="#BBAA78" stroke="#7A5A30" stroke-width="2" transform="rotate(78 100 60)"/>
  <ellipse cx="98" cy="44" rx="8" ry="5.5" fill="#B8A470" stroke="#7A5A30" stroke-width="2" transform="rotate(105 98 44)"/>
  <ellipse cx="86" cy="30" rx="7" ry="5" fill="#C0A870" stroke="#7A5A30" stroke-width="2" transform="rotate(135 86 30)"/>
  <!-- Stinger -->
  <path d="M80,24 Q72,14 68,10" stroke="#7A5A30" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="66" cy="9" rx="4" ry="3" fill="#B09050" stroke="#7A5A30" stroke-width="2" transform="rotate(-25 66 9)"/>

  <!-- Walking legs (4 pairs) -->
  <!-- Left legs -->
  <path d="M30,62 Q16,56 10,64" stroke="#8A6A3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="9" cy="65" r="2.5" fill="#6A4A20"/>
  <path d="M28,70 Q12,70 6,82" stroke="#8A6A3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="5" cy="83" r="2.5" fill="#6A4A20"/>
  <path d="M28,78 Q14,84 10,96" stroke="#8A6A3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="9" cy="97" r="2.5" fill="#6A4A20"/>
  <path d="M32,86 Q20,96 18,108" stroke="#8A6A3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="17" cy="109" r="2.5" fill="#6A4A20"/>
  <!-- Right legs (partially visible) -->
  <path d="M58,62 Q70,56 76,64" stroke="#8A6A3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="77" cy="65" r="2.5" fill="#6A4A20"/>
  <path d="M58,78 Q70,82 74,92" stroke="#8A6A3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="75" cy="93" r="2.5" fill="#6A4A20"/>

  <!-- PINCERS / chelae — raised defensively -->
  <!-- Left pincer arm -->
  <path d="M24,54 Q12,42 6,32" stroke="#9A7A4A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M6,32 Q2,24 6,20" stroke="#9A7A4A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="6" cy="19" r="3.5" fill="#D4B896" stroke="#7A5A30" stroke-width="2"/>
  <path d="M6,32 Q0,28 2,36" stroke="#9A7A4A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="1" cy="37" r="3.5" fill="#D4B896" stroke="#7A5A30" stroke-width="2"/>
  <!-- Right pincer arm -->
  <path d="M42,54 Q44,42 44,30" stroke="#9A7A4A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M44,30 Q42,22 46,18" stroke="#9A7A4A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="47" cy="17" r="3.5" fill="#D4B896" stroke="#7A5A30" stroke-width="2"/>
  <path d="M44,30 Q38,26 38,34" stroke="#9A7A4A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="37" cy="35" r="3.5" fill="#D4B896" stroke="#7A5A30" stroke-width="2"/>

  <!-- UV GLOW outline (blue aura — scorpion fluorescence) -->
  <ellipse cx="40" cy="90" rx="34" ry="21" fill="none" stroke="#55BBFF" stroke-width="8" opacity="0.25"/>
  <ellipse cx="34" cy="68" rx="27" ry="19" fill="none" stroke="#55BBFF" stroke-width="8" opacity="0.20"/>

  <!-- Body / abdomen with segment lines -->
  <ellipse cx="40" cy="90" rx="28" ry="18" fill="#D4B896" stroke="#7A5A30" stroke-width="2.5"/>
  <path d="M16,87 Q40,82 64,87" stroke="#B89870" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M16,94 Q40,99 64,94" stroke="#B89870" stroke-width="1" fill="none" opacity="0.5"/>
  <ellipse cx="33" cy="85" rx="9" ry="5" fill="#E8D0B0" opacity="0.45"/>

  <!-- Cephalothorax -->
  <ellipse cx="34" cy="68" rx="22" ry="16" fill="#CCAF80" stroke="#7A5A30" stroke-width="2.5"/>
  <ellipse cx="27" cy="62" rx="7" ry="4" fill="#E0C898" opacity="0.4"/>

  <!-- BIG WORRIED EYES (the signature!) -->
  <ellipse cx="20" cy="64" rx="9" ry="10" fill="white" stroke="#5A3A18" stroke-width="2.5"/>
  <circle cx="21" cy="65" r="5.5" fill="#3A2818"/>
  <circle cx="23" cy="63" r="2" fill="white"/>
  <!-- Worried eyebrow left (angled = anxious) -->
  <path d="M12,54 Q20,51 28,54" stroke="#7A5A30" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <ellipse cx="46" cy="64" rx="9" ry="10" fill="white" stroke="#5A3A18" stroke-width="2.5"/>
  <circle cx="47" cy="65" r="5.5" fill="#3A2818"/>
  <circle cx="49" cy="63" r="2" fill="white"/>
  <!-- Worried eyebrow right -->
  <path d="M38,54 Q46,51 54,54" stroke="#7A5A30" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Worried small mouth frown -->
  <path d="M26,74 Q33,71 40,74" stroke="#7A5A30" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Chelicerae (tiny mouth parts) -->
  <path d="M28,76 Q24,80 22,78" stroke="#9A7A4A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M38,76 Q42,80 44,78" stroke="#9A7A4A" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Sweat drop (worried!) -->
  <path d="M56,54 Q58,49 56,46 Q54,49 56,54Z" fill="#88CCFF" opacity="0.85"/>
</svg>
