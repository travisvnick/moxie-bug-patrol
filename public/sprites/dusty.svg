<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Tail: curves up over back, stinger at tip -->
  <path d="M24 36 Q32 38 36 32 Q40 26 36 20 Q34 17 31 16" stroke="#B8800A" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M31 16 Q33 12 30 10" stroke="#B8800A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <ellipse cx="29.5" cy="9.5" rx="2" ry="1.5" fill="#E84040" transform="rotate(-20 29.5 9.5)"/>

  <!-- Left claw (pedipalp) -->
  <path d="M18 20 Q11 17 8 19" stroke="#C8920E" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M8 19 Q5 17 7 15 Q9 14 11 16" stroke="#C8920E" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M8 19 Q5 21 7 23 Q9 24 11 22" stroke="#C8920E" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Right claw (pedipalp) -->
  <path d="M28 20 Q35 17 38 19" stroke="#C8920E" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M38 19 Q41 17 39 15 Q37 14 35 16" stroke="#C8920E" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M38 19 Q41 21 39 23 Q37 24 35 22" stroke="#C8920E" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Legs left (4 legs) -->
  <line x1="17" y1="26" x2="8"  y2="22" stroke="#A87010" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="29" x2="6"  y2="28" stroke="#A87010" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="17" y1="33" x2="8"  y2="35" stroke="#A87010" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18" y1="37" x2="10" y2="41" stroke="#A87010" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Legs right (4 legs) -->
  <line x1="31" y1="26" x2="40" y2="22" stroke="#A87010" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="32" y1="29" x2="42" y2="28" stroke="#A87010" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="31" y1="33" x2="40" y2="35" stroke="#A87010" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="30" y1="37" x2="38" y2="41" stroke="#A87010" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Abdomen (lower body, segmented) -->
  <ellipse cx="24" cy="34" rx="8" ry="6.5" fill="#D4A030"/>
  <line x1="16.5" y1="31" x2="31.5" y2="31" stroke="#B8820A" stroke-width="0.7" opacity="0.6"/>
  <line x1="16.5" y1="35" x2="31.5" y2="35" stroke="#B8820A" stroke-width="0.7" opacity="0.6"/>

  <!-- Cephalothorax (upper body) -->
  <ellipse cx="24" cy="25" rx="9" ry="7" fill="#E0B040"/>
  <!-- Carapace highlight -->
  <ellipse cx="22" cy="23" rx="4" ry="2.5" fill="#F0C860" opacity="0.5"/>

  <!-- Head -->
  <ellipse cx="24" cy="16" rx="7" ry="5.5" fill="#ECC050"/>

  <!-- Big scared eyes -->
  <circle cx="20" cy="14" r="3.2" fill="white" stroke="#A87010" stroke-width="0.6"/>
  <circle cx="28" cy="14" r="3.2" fill="white" stroke="#A87010" stroke-width="0.6"/>
  <circle cx="20.5" cy="14.5" r="1.9" fill="#1A1008"/>
  <circle cx="28.5" cy="14.5" r="1.9" fill="#1A1008"/>
  <!-- Whites of eyes (shine) -->
  <circle cx="21" cy="13.5" r="0.8" fill="white"/>
  <circle cx="29" cy="13.5" r="0.8" fill="white"/>
  <!-- Worried brow lines -->
  <path d="M17.5 11.5 Q20 10.5 22.5 11.5" stroke="#A87010" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  <path d="M25.5 11.5 Q28 10.5 30.5 11.5" stroke="#A87010" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  <!-- Sweat drop (scared!) -->
  <path d="M33 12 Q34.5 9.5 33 8 Q31.5 9.5 33 12" fill="#88CCFF" opacity="0.85"/>
</svg>
