<svg xmlns="http://www.w3.org/2000/svg" width="80" height="100" viewBox="0 0 80 100">
  <!-- Shadow -->
  <ellipse cx="40" cy="95" rx="26" ry="7" fill="#C9A86B" opacity="0.4"/>
  <!-- Trunk (palo verde = green bark) -->
  <rect x="33" y="58" width="14" height="34" rx="6" fill="#6B8B3D"/>
  <rect x="36" y="59" width="5" height="32" rx="3" fill="#7CA84A" opacity="0.7"/>
  <!-- Canopy back layer -->
  <ellipse cx="40" cy="46" rx="32" ry="24" fill="#4A8230"/>
  <!-- Canopy mid layer -->
  <ellipse cx="38" cy="40" rx="28" ry="21" fill="#5A9642"/>
  <ellipse cx="44" cy="38" rx="22" ry="18" fill="#5A9642"/>
  <!-- Canopy front (lit) -->
  <ellipse cx="40" cy="34" rx="24" ry="18" fill="#6BAF52"/>
  <!-- Highlight -->
  <ellipse cx="34" cy="28" rx="12" ry="9" fill="#8FCC66" opacity="0.55"/>
  <!-- Trunk outline -->
  <rect x="33" y="58" width="14" height="34" rx="6" fill="none" stroke="#3D5820" stroke-width="1.5"/>
  <!-- Canopy outline -->
  <ellipse cx="40" cy="40" rx="32" ry="24" fill="none" stroke="#3A6825" stroke-width="2"/>
</svg>
