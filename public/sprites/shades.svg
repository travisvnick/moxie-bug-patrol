<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Shadow -->
  <ellipse cx="64" cy="120" rx="28" ry="7" fill="rgba(18,50,80,0.15)"/>

  <!-- Back legs (drawn before body so body covers base) -->
  <path d="M44,90 Q30,104 22,114" stroke="#5A3318" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="21" cy="115" r="3.5" fill="#4A2A10"/>
  <path d="M84,90 Q98,104 106,114" stroke="#5A3318" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="107" cy="115" r="3.5" fill="#4A2A10"/>

  <!-- Middle legs -->
  <path d="M42,70 Q24,72 16,84" stroke="#5A3318" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="15" cy="85" r="3.5" fill="#4A2A10"/>
  <path d="M86,70 Q104,72 112,84" stroke="#5A3318" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="113" cy="85" r="3.5" fill="#4A2A10"/>

  <!-- Front legs (arm-like — confident strut pose) -->
  <path d="M44,58 Q28,52 20,60" stroke="#5A3318" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <circle cx="19" cy="61" r="4" fill="#4A2A10"/>
  <path d="M84,58 Q100,52 108,60" stroke="#5A3318" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <circle cx="109" cy="61" r="4" fill="#4A2A10"/>

  <!-- Body / abdomen -->
  <ellipse cx="64" cy="88" rx="24" ry="28" fill="#8B5E3C" stroke="#4A2A10" stroke-width="2.5"/>
  <!-- Wing covers (elytra) — slight overlay -->
  <ellipse cx="57" cy="86" rx="13" ry="25" fill="#A07548" opacity="0.60"/>
  <ellipse cx="71" cy="86" rx="13" ry="25" fill="#A07548" opacity="0.60"/>
  <!-- Wing seam -->
  <line x1="64" y1="62" x2="64" y2="112" stroke="#5A3318" stroke-width="1.5" opacity="0.55"/>
  <!-- Body highlight -->
  <ellipse cx="57" cy="76" rx="6" ry="4" fill="#B8855A" opacity="0.4"/>

  <!-- Thorax / pronotum shield -->
  <ellipse cx="64" cy="60" rx="20" ry="13" fill="#9B6B45" stroke="#4A2A10" stroke-width="2.5"/>
  <ellipse cx="59" cy="55" rx="5" ry="3" fill="#C49A70" opacity="0.35"/>

  <!-- Head -->
  <ellipse cx="64" cy="42" rx="18" ry="14" fill="#A07548" stroke="#4A2A10" stroke-width="2.5"/>

  <!-- Antennae -->
  <path d="M54,31 Q44,18 34,8" stroke="#5A3318" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="33" cy="7" r="4" fill="#7A4F2A"/>
  <path d="M74,31 Q84,18 94,8" stroke="#5A3318" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="95" cy="7" r="4" fill="#7A4F2A"/>

  <!-- SUNGLASSES (the signature!) -->
  <rect x="45" y="34" width="17" height="12" rx="3" fill="#1A1A1A"/>
  <rect x="66" y="34" width="17" height="12" rx="3" fill="#1A1A1A"/>
  <!-- Bridge -->
  <rect x="62" y="39" width="4" height="2" rx="1" fill="#444"/>
  <!-- Temple arms -->
  <line x1="45" y1="40" x2="38" y2="37" stroke="#444" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="83" y1="40" x2="90" y2="37" stroke="#444" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lens shine -->
  <rect x="48" y="36" width="5" height="3" rx="1.5" fill="white" opacity="0.35"/>
  <rect x="69" y="36" width="5" height="3" rx="1.5" fill="white" opacity="0.35"/>

  <!-- Smug smirk -->
  <path d="M50,51 Q64,60 78,51" stroke="#4A2A10" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Cool tooth -->
  <rect x="62" y="51" width="4" height="5" rx="1" fill="white"/>

  <!-- Swagger lines -->
  <line x1="16" y1="50" x2="6" y2="46" stroke="#0C77D8" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="13" y1="60" x2="3" y2="60" stroke="#0C77D8" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="112" y1="50" x2="122" y2="46" stroke="#0C77D8" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="115" y1="60" x2="125" y2="60" stroke="#0C77D8" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
</svg>
