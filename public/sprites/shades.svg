<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Antennae -->
  <path d="M18 10 Q13 5 9 2" stroke="#2C1810" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M30 10 Q35 5 39 2" stroke="#2C1810" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Legs left side (drawn before body so body covers base) -->
  <line x1="15" y1="25" x2="4" y2="19" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="30" x2="2" y2="30" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="35" x2="5" y2="42" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Legs right side -->
  <line x1="33" y1="25" x2="44" y2="19" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="35" y1="30" x2="46" y2="30" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="33" y1="35" x2="43" y2="42" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Body / elytra (wings) -->
  <ellipse cx="24" cy="31" rx="12" ry="9" fill="#7B3E19"/>
  <!-- Wing seam -->
  <line x1="24" y1="22" x2="24" y2="40" stroke="#5A2D0C" stroke-width="0.8" opacity="0.7"/>
  <!-- Body highlight -->
  <ellipse cx="21" cy="27" rx="4" ry="2.5" fill="#9B5A2A" opacity="0.5"/>
  <!-- Pronotum (shield) -->
  <ellipse cx="24" cy="21" rx="10" ry="6" fill="#8B4A20"/>
  <!-- Head -->
  <ellipse cx="24" cy="13" rx="8" ry="6" fill="#9B5530"/>
  <!-- Sunglasses - left lens -->
  <rect x="14" y="10" width="8" height="6" rx="3" ry="3" fill="#111111"/>
  <!-- Sunglasses - right lens -->
  <rect x="26" y="10" width="8" height="6" rx="3" ry="3" fill="#111111"/>
  <!-- Bridge between lenses -->
  <rect x="22" y="12" width="4" height="1.5" rx="0.5" fill="#333333"/>
  <!-- Temple arms -->
  <line x1="14" y1="13" x2="10" y2="12" stroke="#333333" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="34" y1="13" x2="38" y2="12" stroke="#333333" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Lens shine (cool effect) -->
  <ellipse cx="17.5" cy="11.5" rx="2" ry="1.2" fill="white" opacity="0.35"/>
  <ellipse cx="29.5" cy="11.5" rx="2" ry="1.2" fill="white" opacity="0.35"/>
</svg>
