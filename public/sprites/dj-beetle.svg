<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Iridescent green gradient for elytra -->
    <linearGradient id="elytra-l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7CFC00"/>
      <stop offset="40%" stop-color="#228B22"/>
      <stop offset="75%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="elytra-r" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7CFC00"/>
      <stop offset="40%" stop-color="#228B22"/>
      <stop offset="75%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="shine-l" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#CCFF88" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#228B22" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="64" cy="120" rx="30" ry="7" fill="rgba(18,50,80,0.15)"/>

  <!-- Back legs -->
  <path d="M42,96 Q28,106 20,116" stroke="#3A2A08" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="19" cy="117" r="3.5" fill="#2A1A04"/>
  <path d="M86,96 Q100,106 108,116" stroke="#3A2A08" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="109" cy="117" r="3.5" fill="#2A1A04"/>

  <!-- Middle legs -->
  <path d="M38,78 Q22,80 14,92" stroke="#3A2A08" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="13" cy="93" r="3.5" fill="#2A1A04"/>
  <path d="M90,78 Q106,80 114,92" stroke="#3A2A08" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="115" cy="93" r="3.5" fill="#2A1A04"/>

  <!-- Front legs -->
  <path d="M44,62 Q28,56 20,64" stroke="#3A2A08" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="19" cy="65" r="3.5" fill="#2A1A04"/>
  <path d="M84,62 Q100,56 108,64" stroke="#3A2A08" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="109" cy="65" r="3.5" fill="#2A1A04"/>

  <!-- Elytra (wing cases) — iridescent green, the visual centrepiece -->
  <ellipse cx="57" cy="80" rx="21" ry="31" fill="url(#elytra-l)" stroke="#1A4A10" stroke-width="2.5"/>
  <ellipse cx="71" cy="80" rx="21" ry="31" fill="url(#elytra-r)" stroke="#1A4A10" stroke-width="2.5"/>
  <!-- Iridescent shimmer highlights -->
  <ellipse cx="52" cy="64" rx="9" ry="14" fill="url(#shine-l)" opacity="0.75"/>
  <ellipse cx="76" cy="64" rx="9" ry="14" fill="url(#shine-l)" opacity="0.65"/>
  <!-- Metallic sheen dots -->
  <ellipse cx="58" cy="88" rx="5" ry="8" fill="#7FFF00" opacity="0.25"/>
  <ellipse cx="70" cy="88" rx="5" ry="8" fill="#7FFF00" opacity="0.25"/>
  <!-- Wing seam -->
  <line x1="64" y1="52" x2="64" y2="110" stroke="#1A4A10" stroke-width="2" opacity="0.55"/>

  <!-- Abdomen peek at rear -->
  <ellipse cx="64" cy="108" rx="18" ry="8" fill="#1A1004" stroke="#0A0A04" stroke-width="2"/>

  <!-- Pronotum (thorax shield) -->
  <ellipse cx="64" cy="55" rx="20" ry="13" fill="#1A1A08" stroke="#080808" stroke-width="2.5"/>
  <ellipse cx="57" cy="50" rx="7" ry="4" fill="#4CAF50" opacity="0.30"/>

  <!-- Head -->
  <ellipse cx="64" cy="40" rx="15" ry="12" fill="#222210" stroke="#080808" stroke-width="2.5"/>

  <!-- Eyes — big and round -->
  <ellipse cx="53" cy="38" rx="7" ry="8" fill="white" stroke="#111" stroke-width="2"/>
  <circle cx="54" cy="39" r="4.5" fill="#1A1A1A"/>
  <circle cx="56" cy="37" r="1.8" fill="white"/>
  <ellipse cx="75" cy="38" rx="7" ry="8" fill="white" stroke="#111" stroke-width="2"/>
  <circle cx="76" cy="39" r="4.5" fill="#1A1A1A"/>
  <circle cx="78" cy="37" r="1.8" fill="white"/>

  <!-- HEADPHONE-CABLE ANTENNAE (the signature — long, curly like cables) -->
  <!-- Left antenna: sweeps out then curls back -->
  <path d="M54,30 Q38,18 24,26 Q10,34 14,20 Q18,6 6,10" stroke="#2A1A04" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="5" cy="10" r="5" fill="#4A3010" stroke="#2A1A04" stroke-width="2"/>
  <!-- Right antenna: mirror -->
  <path d="M74,30 Q90,18 104,26 Q118,34 114,20 Q110,6 122,10" stroke="#2A1A04" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="123" cy="10" r="5" fill="#4A3010" stroke="#2A1A04" stroke-width="2"/>

  <!-- Musical note (path-based, no font dependency) -->
  <!-- Left note -->
  <rect x="10" y="44" width="4" height="10" rx="1" fill="#4CAF50" opacity="0.65"/>
  <ellipse cx="10" cy="55" rx="4" ry="2.5" fill="#4CAF50" opacity="0.65"/>
  <!-- Right note -->
  <rect x="114" y="44" width="4" height="10" rx="1" fill="#4CAF50" opacity="0.65"/>
  <ellipse cx="114" cy="55" rx="4" ry="2.5" fill="#4CAF50" opacity="0.65"/>
</svg>
