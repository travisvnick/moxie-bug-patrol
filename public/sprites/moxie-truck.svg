<svg xmlns="http://www.w3.org/2000/svg" width="100" height="90" viewBox="0 0 100 90">
  <!-- Shadow -->
  <ellipse cx="50" cy="86" rx="42" ry="6" fill="#8B6B3A" opacity="0.30"/>

  <!-- WHEELS -->
  <!-- Back wheel -->
  <ellipse cx="14" cy="56" rx="10" ry="6.5" fill="#1A1A1A"/>
  <ellipse cx="14" cy="56" rx="6.5" ry="4" fill="#444"/>
  <ellipse cx="14" cy="56" rx="2.5" ry="1.8" fill="#777"/>
  <!-- Front wheel -->
  <ellipse cx="53" cy="72" rx="10" ry="6.5" fill="#1A1A1A"/>
  <ellipse cx="53" cy="72" rx="6.5" ry="4" fill="#444"/>
  <ellipse cx="53" cy="72" rx="2.5" ry="1.8" fill="#777"/>

  <!-- LEFT FACE — full Moxie Blue van body -->
  <polygon points="0,18 64,50 64,80 0,48" fill="#0C77D8"/>

  <!-- Side windows strip along top of panel -->
  <polygon points="8,23 55,49 55,55 8,29" fill="#B8D8F0" opacity="0.82"/>
  <polygon points="8,23 55,49 55,55 8,29" fill="none" stroke="#0950A0" stroke-width="0.8"/>
  <!-- A-pillar divider (separates cab from rear) -->
  <line x1="48" y1="48" x2="48" y2="58" stroke="#0950A0" stroke-width="1.2" opacity="0.8"/>
  <!-- Sliding door seam on rear panel -->
  <line x1="22" y1="33" x2="22" y2="62" stroke="#0950A0" stroke-width="1.2" opacity="0.7"/>

  <!-- Moxie diamond logo — white, centered on rear panel -->
  <g transform="translate(2,33) scale(0.42)">
    <polygon points="22,0 44,22 22,44 0,22" fill="white"/>
    <path d="M9,28 L9,16 L22,26 L35,16 L35,28"
          stroke="#0C77D8" stroke-width="3.5"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- FRONT FACE — slightly darker blue -->
  <polygon points="64,80 96,64 96,34 64,50" fill="#0A5EB5"/>
  <!-- Windshield -->
  <polygon points="67,62 92,48 92,39 67,53" fill="#B8D8F0" opacity="0.82"/>
  <polygon points="67,62 92,48 92,39 67,53" fill="none" stroke="#0950A0" stroke-width="0.8"/>
  <!-- Headlight -->
  <polygon points="65,72 79,65 79,72 65,79" fill="#FFFBE0" opacity="0.92"/>
  <polygon points="65,72 79,65 79,72 65,79" fill="none" stroke="#DDCC55" stroke-width="0.7"/>
  <!-- Grille lines -->
  <line x1="67" y1="66" x2="93" y2="52" stroke="#0950A0" stroke-width="0.8" opacity="0.7"/>
  <line x1="67" y1="69" x2="93" y2="55" stroke="#0950A0" stroke-width="0.8" opacity="0.7"/>
  <!-- Front bumper strip -->
  <polygon points="64,76 96,60 96,64 64,80" fill="#1A87E8"/>

  <!-- TOP FACE — darker blue roof -->
  <polygon points="0,18 32,2 96,34 64,50" fill="#0B56A0"/>
  <!-- Roof highlight -->
  <polygon points="10,14 32,3 80,27 58,38" fill="#1A6DC8" opacity="0.40"/>

  <!-- OUTLINES -->
  <polygon points="0,18 64,50 64,80 0,48" fill="none" stroke="#063D80" stroke-width="1.5"/>
  <polygon points="64,80 96,64 96,34 64,50" fill="none" stroke="#063D80" stroke-width="1.5"/>
  <polygon points="0,18 32,2 96,34 64,50" fill="none" stroke="#0755A8" stroke-width="1"/>
  <line x1="0" y1="18" x2="0" y2="48" stroke="#063D80" stroke-width="1.5"/>
  <line x1="96" y1="34" x2="96" y2="64" stroke="#063D80" stroke-width="1.5"/>
</svg>
