<svg xmlns="http://www.w3.org/2000/svg" width="100" height="90" viewBox="0 0 100 90">
  <!-- Shadow -->
  <ellipse cx="50" cy="87" rx="44" ry="7" fill="#C9A86B" opacity="0.4"/>

  <!-- WHEELS (visible along bottom of left face) -->
  <!-- Back wheel -->
  <ellipse cx="14" cy="56" rx="11" ry="7" fill="#2A2A2A"/>
  <ellipse cx="14" cy="56" rx="7" ry="4.5" fill="#555"/>
  <ellipse cx="14" cy="56" rx="3" ry="2" fill="#888"/>
  <!-- Front wheel -->
  <ellipse cx="53" cy="72" rx="11" ry="7" fill="#2A2A2A"/>
  <ellipse cx="53" cy="72" rx="7" ry="4.5" fill="#555"/>
  <ellipse cx="53" cy="72" rx="3" ry="2" fill="#888"/>

  <!-- ── LEFT FACE (cargo side, visible to camera) ────────────────────── -->
  <!-- Cargo section: back 60%  (x 0→40) -->
  <polygon points="0,18 40,38 40,68 0,48" fill="#F5F5F5"/>
  <!-- Moxie Blue stripe -->
  <polygon points="0,27 40,47 40,53 0,33" fill="#0C77D8"/>
  <!-- Moxie diamond logo on cargo door -->
  <g transform="translate(5,19) scale(0.20)">
    <polygon points="25,0 50,25 25,50 0,25" fill="#0C77D8"/>
    <path d="M12,30 L12,18 L25,28 L38,18 L38,30" stroke="white" stroke-width="4"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Cargo door seam -->
  <line x1="28" y1="38" x2="28" y2="68" stroke="#DDD" stroke-width="0.8" opacity="0.6"/>

  <!-- Cab section: front 40% (x 40→64) -->
  <polygon points="40,38 64,50 64,80 40,68" fill="#EAEAEC"/>
  <!-- Windshield -->
  <polygon points="43,40 62,49 62,58 43,50" fill="#A8C8E8" opacity="0.85"/>
  <!-- Windshield frame -->
  <polygon points="43,40 62,49 62,58 43,50" fill="none" stroke="#888" stroke-width="0.8"/>
  <!-- Cab door handle -->
  <line x1="56" y1="66" x2="61" y2="69" stroke="#BBB" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ── FRONT FACE (cab front, faces viewer right) ─────────────────── -->
  <!-- Points: FLg=(64,80)→FRg=(96,64)→FRT=(96,34)→FLT=(64,50) -->
  <polygon points="64,80 96,64 96,34 64,50" fill="#EBEBEB"/>
  <!-- Windshield on front -->
  <polygon points="67,62 92,48 92,38 67,52" fill="#A8C8E8" opacity="0.80"/>
  <polygon points="67,62 92,48 92,38 67,52" fill="none" stroke="#999" stroke-width="0.8"/>
  <!-- Headlight -->
  <polygon points="66,74 80,67 80,75 66,82" fill="#FFFAAA" opacity="0.95"/>
  <polygon points="66,74 80,67 80,75 66,82" fill="none" stroke="#DDCC55" stroke-width="0.8"/>
  <!-- Grille -->
  <line x1="67" y1="68" x2="93" y2="54" stroke="#CCC" stroke-width="0.8"/>
  <line x1="67" y1="71" x2="93" y2="57" stroke="#CCC" stroke-width="0.8"/>
  <!-- Moxie Blue bumper strip -->
  <polygon points="64,76 96,60 96,64 64,80" fill="#0C77D8"/>

  <!-- ── TOP FACE (roof) ────────────────────────────────────────────── -->
  <!-- Points: BLT=(0,18)→BRT=(32,2)→FRT=(96,34)→FLT=(64,50) -->
  <polygon points="0,18 32,2 96,34 64,50" fill="#E0E0D8"/>
  <!-- Cab/cargo divider on roof -->
  <line x1="40" y1="38" x2="8" y2="22" stroke="#C8C8C0" stroke-width="0.8" opacity="0.7"/>
  <!-- Cab roof highlight -->
  <polygon points="40,38 64,50 96,34 72,22" fill="#D8D8D0" opacity="0.5"/>

  <!-- ── OUTLINES ────────────────────────────────────────────────────── -->
  <!-- Left face -->
  <polygon points="0,18 64,50 64,80 0,48" fill="none" stroke="#555" stroke-width="1.5"/>
  <!-- Front face -->
  <polygon points="64,80 96,64 96,34 64,50" fill="none" stroke="#555" stroke-width="1.5"/>
  <!-- Top face -->
  <polygon points="0,18 32,2 96,34 64,50" fill="none" stroke="#666" stroke-width="1"/>
  <!-- Vertical corner edges -->
  <line x1="0" y1="18" x2="0" y2="48" stroke="#555" stroke-width="1.5"/>
  <line x1="96" y1="34" x2="96" y2="64" stroke="#555" stroke-width="1.5"/>
</svg>
